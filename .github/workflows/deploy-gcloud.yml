name: Deploy to Google Cloud VM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gcloud-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:sha-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCP_SSH_KEY }}

      - name: Trust GCP host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.GCP_HOST }}" >> ~/.ssh/known_hosts

      - name: Write env file locally
        run: |
          printf '%s' "${{ secrets.ENV_FILE }}" > /tmp/bot.env

      - name: Copy env file to VM
        run: |
          ssh "${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }}" "mkdir -p /opt/telegram-gpt"
          scp /tmp/bot.env "${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }}:/opt/telegram-gpt/.env"

      - name: Deploy on GCP VM
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:sha-${{ github.sha }}
        run: |
          ssh "${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }}" "IMAGE='${IMAGE}' bash -s" <<'EOF'
          set -euo pipefail

          APP_DIR="/opt/telegram-gpt"
          IMAGE="${IMAGE:?}"
          DATA_DIR="$APP_DIR/data"

          mkdir -p "$DATA_DIR"

          docker pull "$IMAGE"

          docker stop telegram-gpt-bot >/dev/null 2>&1 || true
          docker rm telegram-gpt-bot >/dev/null 2>&1 || true

          docker run -d \
            --name telegram-gpt-bot \
            --restart unless-stopped \
            --env-file "$APP_DIR/.env" \
            -v "$DATA_DIR:/app/data" \
            "$IMAGE"

          docker image prune -f >/dev/null 2>&1 || true
          docker ps --filter "name=telegram-gpt-bot"
          EOF
