name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile Python files
        run: python3 -m py_compile *.py handlers/*.py database/*.py alembic/env.py alembic/versions/*.py

      - name: Lint (new modules)
        run: >
          ruff check handlers/ database/ model_registry.py token_budget.py
          app_factory.py

      - name: Type check (new modules)
        run: mypy

      - name: Run tests
        run: pytest tests/ -v
